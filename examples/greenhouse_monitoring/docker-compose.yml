version: "3.9"

services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  agent:
    build:
      context: ../../
      dockerfile: Agentcontainer/agent.Dockerfile
    environment:
      LLM_PROVIDER: anthropic
      LLM_MODEL: claude-sonnet-4-6
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MQTT_BROKER: mqtt://mqtt:1883
      AGENT_ID: greenhouse_agent_1
      AGENT_LAYER: things
      SENSOR_INTERVAL: "5000"
      LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    depends_on:
      - mqtt

  senact:
    build:
      context: ../../
      dockerfile: SenActcontainer/senact.Dockerfile
    environment:
      MQTT_BROKER: mqtt://mqtt:1883
      SENSOR_INTERVAL: "5000"
    depends_on:
      - mqtt

  dashboard:
    build:
      context: ../../
      dockerfile: examples/greenhouse_monitoring/dashboard.Dockerfile
    environment:
      AGENT_URL: http://agent:8080
    ports:
      - "3000:3000"
    depends_on:
      - agent
