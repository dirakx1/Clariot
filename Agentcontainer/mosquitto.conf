# Clariot Agent Container - LLM-powered IoT agent with sensor/actuator control
version: '3.8'

services:
  # MQTT Broker for agent communication
  mqtt:
    image: eclipse-mosquitto:2
    container_name: clariot_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    networks:
      - clariot_net
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Agent Container - Core LLM-powered IoT agent
  agent:
    build:
      context: .
      dockerfile: agent.Dockerfile
    container_name: clariot_agent
    ports:
      - "8080:8080"  # Control Plane API
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}
      - MQTT_BROKER=mqtt://mqtt:1883
      - SENSOR_TOPIC=sensors/#
      - ACTUATOR_TOPIC=actuators/#
      - AGENT_ID=clariot_agent_1
      - AGENT_LAYER=things
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      mqtt:
        condition: service_healthy
    networks:
      - clariot_net
    volumes:
      - agent_data:/app/data
      - agent_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  clariot_net:
    driver: bridge

volumes:
  mqtt_data:
  mqtt_logs:
  agent_data:
  agent_logs:
